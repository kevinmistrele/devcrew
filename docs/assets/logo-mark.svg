<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1c1c21"/>
      <stop offset="1" stop-color="#0c0c0e"/>
    </linearGradient>
    <linearGradient id="accent" x1="180" y1="220" x2="844" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- três funcionários conectados (equipe), acionados a partir de um só nó -->
  <g stroke="url(#accent)" stroke-width="24" stroke-linecap="round" fill="none" opacity="0.95">
    <line x1="512" y1="308" x2="340" y2="628"/>
    <line x1="512" y1="308" x2="684" y2="628"/>
    <line x1="340" y1="628" x2="684" y2="628"/>
  </g>

  <circle cx="512" cy="308" r="76" fill="url(#accent)"/>
  <circle cx="340" cy="628" r="76" fill="#8b5cf6"/>
  <circle cx="684" cy="628" r="76" fill="#0d9488"/>
</svg>

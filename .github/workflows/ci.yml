name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Least privilégio por padrão: este workflow só lê o repositório, nunca escreve nada e
# nunca usa segredos — build/lint/type-check não precisam de nenhum dos dois.
permissions:
  contents: read

# Cancela execuções redundantes quando um push novo chega antes da anterior terminar.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend — type-check & lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check + build
        run: npm run build

      - name: Lint
        run: npm run lint

  rust:
    name: Backend Rust — cargo check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Tauri v2 linka com WebKitGTK/GTK no Linux mesmo só pra "cargo check".
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libssl-dev \
            patchelf \
            build-essential

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --locked
